{% extends "base.html" %}

{% block content %}

<h2> {{user.name}} Favorite Movies</h2>

<ul class="movie-list">
    {% for movie in movies %}
 <li class="movie-card">

    <img src="{{ movie.poster_url }}"
         alt="{{ movie.name }}"
         class="poster">

    <form method="POST">

        <input
            type="text"
            name="new_title"
            value="{{ movie.name }}"
            class="movie-title"
            required>

        <div class="movie-details">

            <p>
                <strong>Year:</strong> {{ movie.year }}
            </p>

            <p>
                <strong>Director:</strong> {{ movie.director }}
            </p>

        </div>

        <button
            type="submit"
            formaction="{{ url_for('update_movie',
            user_id=user.id,
            movie_id=movie.id) }}">
            Update
        </button>

        <button
            type="submit"
            formaction="{{ url_for('delete_movie',
            user_id=user.id,
            movie_id=movie.id) }}">
            Delete
        </button>

    </form>

</li>
    {% endfor %}
</ul>

<form action="{{ url_for('add_movie', user_id=user.id) }}" method="POST">

    <input
        type="text"
        name="new_movie"
        placeholder="Enter movie title"
        required>

    <button type="submit">
        Add Movie
    </button>

</form>

{% endblock %}
