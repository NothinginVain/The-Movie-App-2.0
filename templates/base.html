<!DOCTYPE html>
<html>
<head>
    <title>MoviWeb App</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>🎬 MoviWeb App</h1>
</header>

<nav>
    <a href="{{ url_for('index') }}">Home</a>
</nav>
{% with messages = get_flashed_messages() %}
    {% if messages %}
        <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
{% endwith %}

<main class="container">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
