{% extends "base.html" %}

{% block content %}

<h1>Users</h1>

<ul class="user-list">
    {% for user in users %}
    <li class="user-entry">
        <a href="{{ url_for('user_movies', user_id=user.id) }}" class="btn">{{ user.name }}</a>

    </li>
    {% endfor %}
</ul>

<form action="{{ url_for('create_user') }}" method="POST">

    <input
        type="text"
        name="add_user"
        placeholder="Enter user name"
        required>

    <button type="submit">
        Add User
    </button>

</form>

{% endblock %}
